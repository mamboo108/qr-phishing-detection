<!DOCTYPE html>
<html>
<head>
    <title>URL Phishing Detection</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 40px;
            width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        h1 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lexical URL Phishing Detection</h1>
    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here..." required>
        <br>
        <button type="submit">Check URL</button>
    </form>
</div>

</body>
</html>
