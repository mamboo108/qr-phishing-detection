<!DOCTYPE html>
<html>
<head>
    <title>URL Scanner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center">🛡️ Phishing Link Detector</h2>
            <form method="POST">
                <input type="text" name="url" class="form-control" placeholder="Enter URL to analyze..." required>
                <button type="submit" class="btn btn-primary w-100 mt-3">Analyze URL</button>
            </form>

            {% if result %}
                <div class="mt-4 alert {% if 'SAFE' in result %}alert-success{% else %}alert-danger{% endif %} text-center">
                    <pre style="white-space: pre-wrap; font-family: inherit;">{{ result }}</pre>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
