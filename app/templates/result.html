<div class="report-box">
    <h1>Status: {{ report.status }}</h1>
    <p><strong>Check Level:</strong> {{ report.check }}</p>
    
    {% if report.url %}
        <p><strong>URL Found:</strong> {{ report.url }}</p>
    {% endif %}
    
    <div class="reasoning">
        <strong>Why this result?</strong><br>
        {{ report.reason }}
    </div>
</div>
